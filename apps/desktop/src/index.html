<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>insta-review</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="video"></canvas>
    <div id="waiting">
      <div class="big">insta-review</div>
      <div id="preview" class="hidden">
        <canvas id="preview-canvas"></canvas>
        <div id="preview-label"><span class="dot"></span><span id="preview-status">live</span></div>
      </div>
      <div id="waiting-msg">capturing — press the hotkey in game to review the last moments</div>
    </div>
    <div id="hud" class="hidden">
      <span id="hud-time">0.00 / 0.00</span>
      <span id="hud-frame">f 0</span>
      <span id="hud-rate">1×</span>
      <span id="hud-captured"></span>
      <span id="hud-flags"></span>
    </div>
    <div id="toast" class="hidden"></div>
    <div id="coach" class="hidden">
      <div id="coach-head">
        <span id="coach-title">Coach</span>
        <button id="coach-close" title="Close">×</button>
      </div>
      <div id="coach-provider"></div>
      <div id="coach-progress" class="hidden">
        <div id="coach-stage"></div>
        <div id="coach-bar"><div id="coach-bar-fill"></div></div>
        <button id="coach-cancel">Cancel</button>
      </div>
      <div id="coach-error" class="hidden"></div>
      <div id="coach-body"></div>
    </div>
  </div>

  <div id="bottom">
    <canvas id="timeline"></canvas>
    <div id="controls">
      <button id="btn-replay" title="Replay the last moments (R / Enter)" disabled>⟲ replay</button>
      <div class="group">
        <button id="btn-step-back" title="Step back one frame (,)" disabled>⏴</button>
        <button id="btn-play" title="Play / pause (Space)" disabled>▶</button>
        <button id="btn-step-fwd" title="Step forward one frame (.)" disabled>⏵</button>
      </div>
      <span id="speed-label">speed</span>
      <div class="group" id="speeds"></div>
      <button id="btn-clear" title="Discard this clip, back to live capture (C)" disabled>✕ clear</button>
    </div>
    <div id="statusbar">
      <span id="hints">
        R replay · Space play/pause · , . frame step · J K L · ← → ±1s ·
        1–5 speed · M next marker · E analyze · Z zoom · A aspect · S save ·
        C clear · G settings · Esc close
      </span>
    </div>
  </div>

  <div id="settings" class="hidden">
    <div id="settings-panel">
      <h2>Settings</h2>
      <div id="settings-fields"></div>
      <div id="settings-stats"></div>
      <div class="row buttons">
        <button id="btn-install-gsi">Install CS2 GSI config…</button>
        <button id="btn-apply">Apply &amp; restart capture</button>
        <button id="btn-close-settings">Close</button>
        <button id="btn-quit" class="danger">Quit insta-review</button>
      </div>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
